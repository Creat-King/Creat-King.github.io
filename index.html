    <script>
      let divTyping = document.getElementById("text");
      let i = 0,
        timer = 0;

      str =
        "Should auld acquaintance be forgot.<br>And never brought to mind?<br>Should auld acquaintance be forgot<br>And days of auld lang syne<br>For auld lang syne, my dear";

      function typing() {
        if (i <= str.length) {
          divTyping.innerHTML = str.slice(0, i++) + "_";
          timer = setTimeout(typing, 300);
        } else {
          divTyping.innerHTML = str; //结束打字,移除 _ 光标
          clearTimeout(timer);
        }
      }

      typing();
    </script>
    <script>
      createSnow("", 600);
      let diff = getDiffDate("2017-12-2");
      let content = `“大人不说再见，只计划重逢！”`;
      let days = document.getElementById("days");
      days.innerHTML = content;
      

      var myAuto = document.getElementById('audio');
      myAuto.play();
      myAuto.focus();

      function getDiffDate(targetDate) {
        let date1 = new Date(targetDate);
        let date2 = new Date();
        date1 = new Date(
          date1.getFullYear(),/*  */
          date1.getMonth(),
          date1.getDate()
        );
        date2 = new Date(
          date2.getFullYear(),
          date2.getMonth(),
          date2.getDate()
        );
        const diff = date2.getTime() - date1.getTime();
        const diffDate = diff / (24 * 60 * 60 * 1000);
        return diffDate;
      }
    </script>
